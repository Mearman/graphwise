version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    groups:
      semantic-release:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "*-eslint-*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "fast-check"
          - "@fast-check/*"
      typescript:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "@typescript-eslint/*"
      build:
        patterns:
          - "vite"
          - "vite-plugin-*"
          - "turbo"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(actions)"
