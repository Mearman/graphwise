name: CI
on:
	push:
		branches: [main]
	pull_request:
		branches: [main]
jobs:
	validate:
		runs-on: ubuntu-latest
		steps:
			- uses: actions/checkout@v4
			- uses: pnpm/action-setup@v4
			- uses: actions/setup-node@v4
				with:
					node-version: 22
					cache: pnpm
			- run: pnpm install --frozen-lockfile
			- run: pnpm validate
	deploy:
		needs: validate
		if: github.ref == 'refs/heads/main'
		runs-on: ubuntu-latest
		permissions:
			pages: write
			id-token: write
		environment:
			name: github-pages
			url: ${{ steps.deployment.outputs.page_url }}
		steps:
			- uses: actions/checkout@v4
			- uses: pnpm/action-setup@v4
			- uses: actions/setup-node@v4
				with:
					node-version: 22
					cache: pnpm
			- run: pnpm install --frozen-lockfile
			- run: pnpm build
			- uses: actions/upload-pages-artifact@v3
				with:
					path: dist
			- id: deployment
				uses: actions/deploy-pages@v4
